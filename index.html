<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirin Album Studio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/browser-id3-writer@4.4.0/dist/browser-id3-writer.min.js"></script>
</head>
<body>

<div class="container">
    <header>
        <h1>Kirin Album Studio</h1>
        <p class="subtitle">Aesthetic Media Archiving</p>
    </header>

    <main>
        <div class="upload-section">
            <div id="drop-zone" onclick="document.getElementById('imageInput').click()">
                <span id="label">Tap to Upload Cover Art</span>
                <img id="cover-preview" src="" alt="Preview">
            </div>
            <input type="file" id="imageInput" accept="image/*" hidden>
        </div>

        <div class="info-section">
    <input type="text" id="albumTitle" placeholder="ALBUM NAME">
    <input type="text" id="songArtist" placeholder="ARTIST / KIRIN">
    
    <label for="audioInput" class="custom-file-upload">
        SELECT AUDIO TRACKS
    </label>
    <input type="file" id="audioInput" accept="audio/*" multiple>
    
    <p class="hint">*Files will be processed in the order selected</p>
        </div>

        <div id="tracklist-container" class="tracklist">
            <h3>Tracklist Preview</h3>
            <ul id="file-list"></ul>
        </div>

        <button id="processBtn" onclick="processAlbum()">Generate Full Album</button>
    </main>

    <footer>
        <p>Created by Kirin &bull; LanzMagick</p>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
