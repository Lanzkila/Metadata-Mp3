<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirin Album Studio | V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/browser-id3-writer@4.4.0/dist/browser-id3-writer.min.js"></script>
</head>
<body>

<div class="container">
    <header>
        <h1>KIRIN ALBUM STUDIO</h1>
        <div class="divider"></div>
        <p class="subtitle">PREMIUM MEDIA ARCHIVING SYSTEM</p>
    </header>

    <main>
        <div class="upload-section">
            <div id="drop-zone" onclick="document.getElementById('imageInput').click()">
                <div class="overlay-text" id="label">TAP TO UPLOAD ART</div>
                <img id="cover-preview" src="" alt="Preview">
            </div>
            <input type="file" id="imageInput" accept="image/*" hidden>
        </div>

        <div class="info-section">
            <div class="input-group">
                <label>ALBUM TITLE</label>
                <input type="text" id="albumTitle" placeholder="REQUIRED">
            </div>
            <div class="input-group">
                <label>ARTIST NAME</label>
                <input type="text" id="songArtist" placeholder="KIRIN / LANZMAGICK">
            </div>
            
            <div class="info-section">
    <label for="audioInput" class="custom-file-upload">
        SELECT AUDIO TRACKS
    </label>
    <input type="file" id="audioInput" accept="audio/*" multiple hidden>

    <p class="hint">FILES PROCESSED BY SELECTION ORDER</p>
</div>

        <div id="tracklist-container" class="tracklist">
            <h3>TRACKLIST PREVIEW</h3>
            <ul id="file-list"></ul>
        </div>

        <button id="processBtn" onclick="processAlbum()">GENERATE FULL ALBUM</button>
    </main>

    <footer>
        <p>CORE ENGINE BY KIRIN &bull; LANZMAGICK</p>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
